name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libuv1-dev libssl-dev libutf8proc-dev

      - name: Install MoonBit
        env:
          MOON_HOME: ${{ runner.temp }}/moon
        run: |
          bash scripts/install-moonbit.sh latest "$MOON_HOME"
          echo "$MOON_HOME/bin" >> "$GITHUB_PATH"
          echo "MOON_HOME=$MOON_HOME" >> "$GITHUB_ENV"

      - name: Verify MoonBit install
        run: |
          moon version
          test -f "$MOON_HOME/lib/core/_build/native/release/bundle/prelude/prelude.mi"

      - name: Cache mooncakes
        uses: actions/cache@v6
        with:
          path: .mooncakes
          key: ${{ runner.os }}-mooncakes-${{ hashFiles('moon.mod', 'src/**/moon.pkg') }}
          restore-keys: |
            ${{ runner.os }}-mooncakes-

      - name: Update registry
        run: |
          for attempt in 1 2 3; do
            moon update && exit 0
            echo "moon update attempt $attempt failed; retrying in 15s" >&2
            sleep 15
          done
          moon update

      - name: Pre-commit staged-only sanity
        run: bash tools/pre_commit_staged_test.sh

      - name: Pre-commit fmt-restore sanity
        run: bash tools/test_pre_commit_hook.sh

      - name: Hermeticity lint
        run: |
          moon build src/bin/choir_lint --target native
          _build/native/debug/build/src/bin/choir_lint/choir_lint.exe

      - name: Test hermetic suite
        run: CHOIR_TEST_NO_EXEC=1 moon test --target native

      - name: Build choir binary for real exec tests
        run: moon build src/bin/choir --target native

      - name: Test real exec adapters
        run: CHOIR_TEST_REAL_EXEC=1 moon test --target native src/exec src/bin/choir

      - name: Build release binary
        run: moon build --target native --release
