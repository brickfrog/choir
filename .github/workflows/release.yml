name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate tag matches moon.mod
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(python3 -c 'import pathlib, re, sys; text = pathlib.Path("moon.mod").read_text(encoding="utf-8"); match = re.search("(?m)^[ \\t]*version[ \\t]*=[ \\t]*\"([^\\n\"]+)\"(?:[ \\t]*(?://.*)?)?$", text); sys.exit("moon.mod is missing a version = \"...\" line") if match is None else print(match.group(1))')"
          if [ "$tag_version" != "$file_version" ]; then
            echo "tag version ($tag_version) does not match moon.mod ($file_version)" >&2
            exit 1
          fi

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x86_64
            artifact_name: choir-linux-x86_64
            shell: bash
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libuv1-dev libssl-dev libsqlite3-dev libutf8proc-dev

      - name: Install MoonBit
        env:
          MOON_HOME: ${{ runner.temp }}/moon
        run: |
          bash scripts/install-moonbit.sh 0.10.4+2cc641edf+75c7e1f "$MOON_HOME"
          echo "$MOON_HOME/bin" >> "$GITHUB_PATH"
          echo "MOON_HOME=$MOON_HOME" >> "$GITHUB_ENV"

      - name: Verify MoonBit install
        run: |
          moon version
          test -f "$MOON_HOME/lib/core/_build/native/release/bundle/prelude/prelude.mi"

      - name: Cache mooncakes
        uses: actions/cache@v6
        with:
          path: .mooncakes
          key: release-${{ runner.os }}-mooncakes-${{ hashFiles('moon.mod', 'src/**/moon.pkg') }}
          restore-keys: |
            release-${{ runner.os }}-mooncakes-
            ${{ runner.os }}-mooncakes-

      - name: Update registry
        run: |
          for attempt in 1 2 3; do
            moon update && exit 0
            echo "moon update attempt $attempt failed; retrying in 15s" >&2
            sleep 15
          done
          moon update

      - name: Build release binary
        run: moon build --target native --release

      - name: Package artifact
        run: |
          mkdir -p release
          cp _build/native/release/build/src/bin/choir/choir.exe "release/${{ matrix.artifact_name }}"
          chmod +x "release/${{ matrix.artifact_name }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi
          mv "${{ matrix.artifact_name }}.sha256" release/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Write combined checksums
        run: |
          cd release
          cat *.sha256 > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          body: |
            Native Choir binaries for the current tag.

            Runtime dependencies:
            - Linux with KVM enabled
            - libutf8proc
            - SQLite 3 (`libsqlite3.so.0`)
            - Node.js
            - Bubblewrap (`bwrap`)
            - git
            - gh for PR workflow
            - BoxLite
            - MoonBit
            - bd
            - subscription-authenticated claude and codex CLIs
