prenotify_checks = ["moon check --target native", "CHOIR_TEST_NO_EXEC=1 moon test --target native", "CHOIR_TEST_REAL_EXEC=1 moon test --target native src/exec", "moon run src/bin/choir_lint --target native"]

[project]
verify_cmd = "moon check --target native && moon test --target native"

# Per-agent model selection (choir-w5m7). Passthrough to `codex --model <value>`.
# dev (gpt-5.3-codex-spark) PARKED: spark could not drive the agentic TDD-leaf
# protocol (mis-sequenced Red->Done, false verify-pass, exit-255 build) on first
# trial. gpt-5.6-luna was parked on 2026-07-09 blaming it for codex leaves'
# `choir mcp-stdio` subprocess launching with an empty CHOIR_* environment;
# that was disproven the same day — gpt-5.5 leaves had identically scrubbed
# env. Real cause: codex's shell_environment_policy never forwards the shell
# environment into MCP stdio subprocesses, and choir's codex MCP entry set no
# per-server env forwarding (choir-ghl9, fixed via
# `mcp_servers.choir.env_vars` in codex_mcp_override_args). Model was never at
# fault; re-tiering dev beyond gpt-5.5 is the operator's call once the fix
# proves out. Effort is the real quota lever — see choir-mn0l.
[model.codex]
default = "gpt-5.5"

# Per-agent reasoning effort (choir-mn0l). Emits `-c model_reasoning_effort=<v>`.
# dev=high: coding leaves drop off the global xhigh (the quota saver). Audits/workers
# unset -> inherit the global codex effort (xhigh), where the reasoning is worth it.
[effort.codex]
dev = "high"
