prenotify_checks = ["moon check --target native", "CHOIR_TEST_NO_EXEC=1 moon test --target native", "CHOIR_TEST_REAL_EXEC=1 moon test --target native src/exec", "moon run src/bin/choir_lint --target native"]

[project]
verify_cmd = "moon check --target native && moon test --target native"

# Per-agent model selection (choir-w5m7). Passthrough to `codex --model <value>`.
# dev (gpt-5.3-codex-spark) PARKED: spark could not drive the agentic TDD-leaf
# protocol (mis-sequenced Red->Done, false verify-pass, exit-255 build) on first
# trial. Coding leaves inherit gpt-5.5 until that's reliable. Effort is the real
# quota lever — see choir-mn0l.
[model.codex]
default = "gpt-5.5"

# Per-agent reasoning effort (choir-mn0l). Emits `-c model_reasoning_effort=<v>`.
# dev=low: coding leaves drop off the global xhigh (the quota saver). Audits/workers
# unset -> inherit the global codex effort (xhigh), where the reasoning is worth it.
[effort.codex]
dev = "low"
