prenotify_checks = ["moon check --target native", "CHOIR_TEST_NO_EXEC=1 moon test --target native", "CHOIR_TEST_REAL_EXEC=1 moon test --target native src/exec", "moon run src/bin/choir_lint --target native"]

[project]
verify_cmd = "moon check --target native && moon test --target native"

# Per-agent model selection (choir-w5m7). Passthrough to `codex --model <value>`.
# dev (gpt-5.3-codex-spark) PARKED: spark could not drive the agentic TDD-leaf
# protocol (mis-sequenced Red->Done, false verify-pass, exit-255 build) on first
# trial. gpt-5.6 tier split: dev leaves get well-scoped briefs from the TL, so
# luna (cheap/fast) at xhigh effort trades model size for reasoning depth;
# workers (audits) get terra (~gpt-5.5-equivalent) since single-pass review
# judgment benefits more from model strength than effort. NOTE: luna was
# briefly (and wrongly) blamed on 2026-07-09 for codex leaves' mcp-stdio
# launching with an empty CHOIR_* env — the real cause was codex's MCP stdio
# launcher building server envs from scratch (env_clear() + DEFAULT_ENV_VARS
# whitelist in rmcp-client's create_env_for_mcp_server; shell_environment_policy
# only affects shell/exec tools, not MCP) with no per-server forwarding in
# choir's codex MCP entry (choir-ghl9, fixed via `mcp_servers.choir.env_vars`
# in codex_mcp_override_args). Effort is the real quota lever — see choir-mn0l.
[model.codex]
default = "gpt-5.6-terra"
dev = "gpt-5.6-luna"
worker = "gpt-5.6-terra"

# Per-agent reasoning effort (choir-mn0l). Emits `-c model_reasoning_effort=<v>`.
# dev=xhigh: compensates for luna's smaller tier with max reasoning depth.
# worker=high: terra doesn't need max effort for review/audit judgment calls.
[effort.codex]
dev = "xhigh"
worker = "high"
